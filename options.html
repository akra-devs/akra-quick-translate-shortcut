<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akra Quick Translate Options</title>
  </head>
  <body>
    <main class="options-shell">
      <header>
        <p class="eyebrow">Akra Quick Translate</p>
        <h1>Translation</h1>
      </header>

      <form id="settings-form" class="settings-panel">
        <section class="language-route" aria-label="Translation languages">
          <label class="field">
            <span>Source</span>
            <select id="source-language" name="sourceLanguage"></select>
          </label>

          <div class="route-arrow" aria-hidden="true">&rarr;</div>

          <label class="field">
            <span>Target</span>
            <select id="target-language" name="targetLanguage"></select>
          </label>
        </section>

        <label class="toggle-row">
          <input id="show-overlay" type="checkbox" name="showOverlay" />
          <span>Status overlay</span>
        </label>

        <div class="actions">
          <button type="submit">Save</button>
          <button id="open-shortcuts" class="shortcut-button" type="button">
            <span>Shortcut</span>
            <kbd id="shortcut-label">Alt+T</kbd>
          </button>
        </div>

        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script type="module" src="/src/options.ts"></script>
  </body>
</html>
